name: Update Cardmarket prices

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Update prices
        run: node scripts/update-cardmarket-prices.mjs
        env:
          MAX_CARDS_PER_RUN: 40
          CARDMARKET_DELAY_MS: 3500
          CARDMARKET_REFRESH_HOURS: 24
          CARDMARKET_RETRY_MISSING_HOURS: 0
          CARDMARKET_PRICE_MODE: foil
          CARDMARKET_MIN_CONDITION: 2
          CARDMARKET_DEBUG: 1

      - name: Commit price data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add public/data/cardmarket-prices.json

          if [ -d "public/data/cardmarket-debug" ]; then
            git add public/data/cardmarket-debug
          fi

          if git diff --cached --quiet; then
            echo "No price changes to commit"
          else
            git commit -m "Update Cardmarket prices"
            git push
          fi
